<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Substack Monitoring Dashboard</title>
<style>
:root{--bg:#0b1020;--panel:#111827;--panel2:#0f172a;--text:#f8fafc;--muted:#94a3b8;--border:#334155;--accent:#f97316;--good:#22c55e;--bad:#ef4444;--link:#93c5fd}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#1e293b,#020617 45%,#0b1020);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(2,6,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:18px 22px}h1{margin:0;font-size:clamp(24px,3vw,38px);letter-spacing:-.04em}.sub{color:var(--muted);margin-top:6px;line-height:1.45}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button,input,select{border:1px solid var(--border);border-radius:12px;background:#0b1220;color:var(--text);padding:10px 12px;font-size:14px}button{cursor:pointer;background:linear-gradient(135deg,#f97316,#ea580c);border:0;font-weight:800}button.secondary{background:#0b1220;border:1px solid var(--border)}main{max-width:1450px;margin:auto;padding:22px}.status{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.pill{font-size:13px;color:var(--muted);border:1px solid var(--border);background:rgba(15,23,42,.7);border-radius:999px;padding:7px 10px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(345px,1fr));gap:16px}.card{border:1px solid var(--border);border-radius:18px;background:rgba(17,24,39,.88);overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.24)}.card-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.card h2{margin:0;font-size:20px}.profile{display:inline-block;margin-top:8px;color:var(--link);text-decoration:none;font-size:13px}.count{font-size:12px;color:var(--muted);white-space:nowrap}.posts{padding:12px;display:flex;flex-direction:column;gap:10px}.post{border:1px solid rgba(51,65,85,.9);background:#0b1220;border-radius:14px;padding:12px}.post a.title{color:#e0f2fe;text-decoration:none;font-weight:800;line-height:1.35}.post a.title:hover{text-decoration:underline}.meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}.badge{color:#fed7aa}.excerpt{color:#cbd5e1;font-size:13px;line-height:1.4;margin-top:8px}.empty,.error{color:var(--muted);line-height:1.5;padding:12px}.error{color:#fecaca}.new{display:inline-block;margin-left:7px;font-size:11px;color:#022c22;background:#86efac;border-radius:999px;padding:2px 7px;font-weight:900}.footer{color:var(--muted);font-size:12px;margin-top:20px;line-height:1.4}
</style>
</head>
<body>
<header>
  <h1>Substack Monitoring Dashboard</h1>
  <div class="sub">Refreshable dashboard for selected Substack accounts. Click any post title to open it on Substack.</div>
  <div class="controls">
    <button id="refreshBtn">Refresh Posts</button>
    <button class="secondary" id="autoBtn">Auto-refresh: Off</button>
    <input id="filter" placeholder="Search posts..." />
    <select id="maxItems"><option value="5">5 per account</option><option value="10" selected>10 per account</option><option value="20">20 per account</option></select>
  </div>
</header>
<main>
  <div class="status"><span class="pill" id="lastUpdated">Not refreshed yet</span><span class="pill" id="loadStatus">Waiting</span></div>
  <section id="dashboard" class="grid"></section>
  <div class="footer">Tip: if a profile feed is blocked or unavailable, the card links to the original Substack profile so you can still open it directly.</div>
</main>
<script>
const dashboard=document.getElementById('dashboard');let data=null,seen=new Set(JSON.parse(localStorage.getItem('seenPosts')||'[]')),auto=null;
function fmtDate(d){if(!d)return '';const dt=new Date(d);if(isNaN(dt))return '';return dt.toLocaleString();}
function ago(d){if(!d)return '';const dt=new Date(d);if(isNaN(dt))return '';const s=(Date.now()-dt)/1000;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function renderLoading(){dashboard.innerHTML='<div class="card"><div class="empty">Loading Substack posts...</div></div>';}
function render(){if(!data){renderLoading();return;}const filter=document.getElementById('filter').value.toLowerCase().trim();const max=Number(document.getElementById('maxItems').value);dashboard.innerHTML=data.substacks.map(s=>{const r=data.results[s.name]||{posts:[],ok:false,error:'No data'};let posts=(r.posts||[]).filter(p=>!filter||(p.title+' '+p.excerpt+' '+p.author).toLowerCase().includes(filter)).slice(0,max);return `<article class="card"><div class="card-head"><div><h2>${s.name}</h2><a class="profile" target="_blank" href="${s.profile}">Open Substack profile</a></div><span class="count">${posts.length} post${posts.length===1?'':'s'}</span></div><div class="posts">${!r.ok?`<div class="error">Could not load RSS feed. ${r.error||''}</div>`:''}${posts.length?posts.map(p=>{const key=p.link||p.title;const isNew=!seen.has(key);return `<div class="post"><a class="title" target="_blank" rel="noopener noreferrer" href="${p.link}">${p.title}${isNew?'<span class="new">NEW</span>':''}</a><div class="meta"><span class="badge">${p.source}</span><span>${ago(p.date)}</span><span>${fmtDate(p.date)}</span></div>${p.excerpt?`<div class="excerpt">${p.excerpt}</div>`:''}</div>`}).join(''):`<div class="empty">No matching posts found.</div>`}</div></article>`}).join('');}
async function refresh(){renderLoading();document.getElementById('loadStatus').textContent='Fetching...';try{const res=await fetch('/api/posts',{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);data=await res.json();document.getElementById('lastUpdated').textContent='Last refreshed: '+new Date(data.updatedAt).toLocaleString();let total=0;Object.values(data.results).forEach(r=>(total+=(r.posts||[]).length));document.getElementById('loadStatus').textContent=`Loaded ${total} posts`;render();Object.values(data.results).forEach(r=>(r.posts||[]).forEach(p=>seen.add(p.link||p.title)));localStorage.setItem('seenPosts',JSON.stringify([...seen].slice(-500)));}catch(e){dashboard.innerHTML=`<div class="card"><div class="error">Failed to load posts: ${e.message}</div></div>`;document.getElementById('loadStatus').textContent='Error';}}
document.getElementById('refreshBtn').addEventListener('click',refresh);document.getElementById('filter').addEventListener('input',render);document.getElementById('maxItems').addEventListener('change',render);document.getElementById('autoBtn').addEventListener('click',e=>{if(auto){clearInterval(auto);auto=null;e.target.textContent='Auto-refresh: Off';}else{auto=setInterval(refresh,5*60*1000);e.target.textContent='Auto-refresh: Every 5 min';refresh();}});refresh();
</script>
</body>
</html>
