<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Substack Monitoring Dashboard</title>
<style>
:root{--bg:#f6f7fb;--panel:#ffffff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--accent:#111827;--green:#dcfce7;--greenText:#166534;--blue:#eef2ff;--blueText:#3730a3;--shadow:0 10px 30px rgba(15,23,42,.06)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(246,247,251,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:18px 22px}h1{margin:0;font-size:clamp(24px,3vw,36px);letter-spacing:-.04em}.sub{color:var(--muted);margin-top:6px;line-height:1.45}.topControls,.filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button,input,select{border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:#0f172a;padding:11px 13px;font-size:15px}input{min-width:260px}select{min-width:210px}button{cursor:pointer;font-weight:800}button.primary,.viewBtn.active{background:#111827;color:#fff;border-color:#111827}button:hover{filter:brightness(.98)}main{max-width:1480px;margin:auto;padding:18px}.status{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.pill{font-size:13px;color:var(--muted);border:1px solid var(--border);background:#fff;border-radius:999px;padding:7px 10px}.panel{border:1px solid var(--border);border-radius:16px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}.groupHead{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);font-weight:900;font-size:19px}.caret{color:#94a3b8;margin-right:8px}.count{font-size:13px;font-weight:500;color:#1e293b;background:#f1f5f9;border-radius:999px;padding:6px 12px;white-space:nowrap}.post{padding:16px 20px;border-bottom:1px solid #edf2f7}.post:last-child{border-bottom:0}.title{display:inline-block;color:#020617;text-decoration:none;font-size:18px;font-weight:850;line-height:1.3}.title:hover{text-decoration:underline}.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:14px}.badge{border-radius:999px;padding:4px 10px;font-size:13px}.source{background:var(--green);color:var(--greenText)}.country{background:var(--blue);color:var(--blueText)}.excerpt{color:#475569;font-size:15px;line-height:1.45;margin-top:10px;max-width:1200px}.empty,.error{padding:18px;color:var(--muted)}.error{color:#b91c1c}.tableWrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{padding:12px 14px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}.table th{background:#f8fafc;font-size:13px;color:#475569}.table a{color:#020617;font-weight:750;text-decoration:none}.table a:hover{text-decoration:underline}.hidden{display:none}.footer{color:var(--muted);font-size:12px;margin:20px 0;line-height:1.4}@media(max-width:720px){input,select,button{width:100%;min-width:0}.groupHead{align-items:flex-start}.title{font-size:16px}}
</style>
</head>
<body>
<header>
  <h1>Substack Monitoring Dashboard</h1>
  <div class="sub">Filter posts by writer/person and country. Click any title to open the original Substack post.</div>
  <div class="topControls">
    <button class="primary" id="refreshBtn">Refresh Posts</button>
    <button id="autoBtn">Auto-refresh: Off</button>
  </div>
  <div class="filters">
    <input id="search" placeholder="Search titles & excerpts..." />
    <select id="personFilter"><option value="all">All people</option></select>
    <select id="countryFilter"><option value="all">All countries</option></select>
    <button class="viewBtn active" data-view="person">By Person</button>
    <button class="viewBtn" data-view="country">By Country</button>
    <button class="viewBtn" data-view="table">Table</button>
  </div>
</header>
<main>
  <div class="status"><span class="pill" id="lastUpdated">Not refreshed yet</span><span class="pill" id="loadStatus">Waiting</span></div>
  <section id="dashboard"></section>
  <div class="footer">Country labels are auto-detected from each post title and excerpt using keyword matching. You can adjust the country keyword list in <code>server.js</code>.</div>
</main>
<script>
let data=null,view='person',auto=null;
const dashboard=document.getElementById('dashboard');
const search=document.getElementById('search');
const personFilter=document.getElementById('personFilter');
const countryFilter=document.getElementById('countryFilter');
function esc(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function dateOnly(d){if(!d)return '';const dt=new Date(d);return isNaN(dt)?'':dt.toISOString().slice(0,10);}
function allPosts(){if(!data)return [];return Object.values(data.results).flatMap(r=>r.posts||[]).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));}
function applyFilters(posts){const q=search.value.toLowerCase().trim(),person=personFilter.value,country=countryFilter.value;return posts.filter(p=>(person==='all'||p.author===person)&&(country==='all'||p.country===country)&&(!q||(p.title+' '+p.excerpt+' '+p.author+' '+p.country+' '+p.source).toLowerCase().includes(q)));}
function fillDropdowns(){const people=[...new Set(allPosts().map(p=>p.author).filter(Boolean))].sort();const countries=[...new Set(allPosts().map(p=>p.country).filter(Boolean))].sort();const currentPerson=personFilter.value,currentCountry=countryFilter.value;personFilter.innerHTML='<option value="all">All people</option>'+people.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');countryFilter.innerHTML='<option value="all">All countries</option>'+countries.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');if(people.includes(currentPerson))personFilter.value=currentPerson;if(countries.includes(currentCountry))countryFilter.value=currentCountry;}
function postHtml(p){return `<div class="post"><a class="title" target="_blank" rel="noopener noreferrer" href="${esc(p.link)}">${esc(p.title)}</a><div class="meta"><span>${esc(dateOnly(p.date))}</span><span class="badge source">${esc(p.source)}</span><span class="badge country">${esc(p.country)}</span><span>${esc(p.author)}</span></div>${p.excerpt?`<div class="excerpt">${esc(p.excerpt)}</div>`:''}</div>`;}
function groupPanel(name,posts){return `<section class="panel"><div class="groupHead"><div><span class="caret">▼</span>${esc(name)}</div><span class="count">${posts.length} post${posts.length===1?'':'s'}</span></div>${posts.length?posts.map(postHtml).join(''):'<div class="empty">No matching posts found.</div>'}</section>`;}
function renderBy(field,labelFallback){const posts=applyFilters(allPosts());const groups={};posts.forEach(p=>{const key=p[field]||labelFallback;groups[key]=groups[key]||[];groups[key].push(p);});const keys=Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length||a.localeCompare(b));dashboard.innerHTML=keys.length?keys.map(k=>groupPanel(k,groups[k])).join(''):'<section class="panel"><div class="empty">No matching posts found.</div></section>';}
function renderTable(){const posts=applyFilters(allPosts());dashboard.innerHTML=`<section class="panel tableWrap"><table class="table"><thead><tr><th>Date</th><th>Title</th><th>Person</th><th>Country</th><th>Substack</th></tr></thead><tbody>${posts.length?posts.map(p=>`<tr><td>${esc(dateOnly(p.date))}</td><td><a target="_blank" href="${esc(p.link)}">${esc(p.title)}</a><div class="excerpt">${esc((p.excerpt||'').slice(0,160))}</div></td><td>${esc(p.author)}</td><td><span class="badge country">${esc(p.country)}</span></td><td><span class="badge source">${esc(p.source)}</span></td></tr>`).join(''):`<tr><td colspan="5">No matching posts found.</td></tr>`}</tbody></table></section>`;}
function render(){if(!data){dashboard.innerHTML='<section class="panel"><div class="empty">Loading posts...</div></section>';return;}fillDropdowns();if(view==='person')renderBy('author','Unknown Person');else if(view==='country')renderBy('country','Uncategorized');else renderTable();}
async function refresh(){dashboard.innerHTML='<section class="panel"><div class="empty">Loading posts...</div></section>';document.getElementById('loadStatus').textContent='Fetching...';try{const res=await fetch('/api/posts',{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);data=await res.json();const total=allPosts().length;document.getElementById('lastUpdated').textContent='Last refreshed: '+new Date(data.updatedAt).toLocaleString();document.getElementById('loadStatus').textContent=`Loaded ${total} posts`;render();}catch(e){document.getElementById('loadStatus').textContent='Error';dashboard.innerHTML=`<section class="panel"><div class="error">Failed to load posts: ${esc(e.message)}</div></section>`;}}
document.getElementById('refreshBtn').addEventListener('click',refresh);document.getElementById('autoBtn').addEventListener('click',e=>{if(auto){clearInterval(auto);auto=null;e.target.textContent='Auto-refresh: Off';}else{auto=setInterval(refresh,5*60*1000);e.target.textContent='Auto-refresh: Every 5 min';refresh();}});[search,personFilter,countryFilter].forEach(el=>el.addEventListener('input',render));document.querySelectorAll('.viewBtn').forEach(btn=>btn.addEventListener('click',()=>{view=btn.dataset.view;document.querySelectorAll('.viewBtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}));refresh();
</script>
</body>
</html>
